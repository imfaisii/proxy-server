services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  telemt:
    image: ghcr.io/telemt/telemt:latest
    command: ["/etc/telemt/config.toml"]
    # Host networking so telemt's API/metrics whitelist (127.0.0.1) actually sees
    # loopback when the host-networked console connects — published ports would
    # SNAT the source to the docker bridge gateway and the whitelist would reject.
    network_mode: host
    # cwd on the writable tmpfs so telemt's runtime proxy-secret cache (needed for
    # use_middle_proxy/ad_tag) isn't written to the read-only rootfs. Matches upstream.
    working_dir: /run/telemt
    volumes:
      # :rw — telemt persists users/ad-tags (disk-first) + the tls_front cache here.
      # Must be writable by telemt's nonroot uid (deploy.sh chowns it).
      - ./telemt:/etc/telemt:rw
    tmpfs:
      - /run/telemt:size=8M,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    restart: unless-stopped

  console:
    build: .
    env_file: .env
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data/geoip:/app/data/geoip:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    network_mode: host
    restart: unless-stopped

volumes:
  pgdata:
