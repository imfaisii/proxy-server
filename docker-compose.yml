services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  telemt:
    image: ghcr.io/telemt/telemt:latest
    command: ["/etc/telemt/config.toml"]
    # Host networking so telemt's API/metrics whitelist (127.0.0.1) actually sees
    # loopback when the host-networked console connects — published ports would
    # SNAT the source to the docker bridge gateway and the whitelist would reject.
    network_mode: host
    # cwd on the writable tmpfs so telemt's runtime proxy-secret cache (needed for
    # use_middle_proxy/ad_tag) isn't written to the read-only rootfs. Matches upstream.
    working_dir: /run/telemt
    volumes:
      # :rw — telemt persists users/ad-tags (disk-first) + the tls_front cache here.
      # Must be writable by telemt's nonroot uid (deploy.sh chowns it).
      - ./telemt:/etc/telemt:rw
    tmpfs:
      - /run/telemt:size=8M,mode=1777
    cap_drop:
      - ALL
    cap_add:
      # NET_BIND_SERVICE isn't effective for telemt's non-root uid under
      # no-new-privileges, so deploy.sh ALSO sets the host sysctl
      # net.ipv4.ip_unprivileged_port_start=443 to permit the 443 bind.
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    restart: unless-stopped

  console:
    build: .
    env_file: .env
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data/geoip:/app/data/geoip:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    network_mode: host
    restart: unless-stopped

  # Full-device WireGuard VPN — a SEPARATE service from telemt (which stays
  # Telegram-only). UDP 51820 = the tunnel (public, can't clash with telemt's
  # TCP 443). TCP 51821 = admin UI, bound to LOOPBACK only for safety — reach it
  # via an SSH forward:  ssh -L 51821:127.0.0.1:51821 root@<server>
  # wg-easy v15: do NOT set PASSWORD / PASSWORD_HASH (their presence blocks
  # startup); the admin user is created via the one-time web wizard at :51821.
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    networks:
      wg:
        ipv4_address: 10.42.42.42
    ports:
      - "51820:51820/udp"
      - "127.0.0.1:51821:51821/tcp"
    volumes:
      - etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

volumes:
  pgdata:
  etc_wireguard:

networks:
  wg:
    driver: bridge
    ipam:
      config:
        - subnet: 10.42.42.0/24
